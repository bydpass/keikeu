<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>keikeu UI · 三页流水线</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="keikeu/styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: #e8e5df; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- pipeline logic (plain JS, runs first) -->
<script src="keikeu/pipeline.js"></script>

<!-- canvas + shared core + variants (Babel) -->
<script type="text/babel" src="keikeu/design-canvas.jsx"></script>
<script type="text/babel" src="keikeu/keikeu-core.jsx"></script>
<script type="text/babel" src="keikeu/variant-a.jsx"></script>
<script type="text/babel" src="keikeu/variant-b.jsx"></script>
<script type="text/babel" src="keikeu/variant-c.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard, VariantA, VariantB, VariantC } = window;
  const pad = { background: '#e8e5df', display: 'flex', alignItems: 'center', justifyContent: 'center' };

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="keikeu"
          title="keikeu · 三页流水线"
          subtitle="灵光池 Memo → 配方票 Ticket → 写作调理 Review ·  同一套绿/奶油配色，三种结构方案，可点：写灵感 → 生成配方票 → 切 SOP/Brief/名片 → 复制">
          <DCArtboard id="a" label="A · 票务台 Tabview" width={1000} height={720} style={pad}>
            <VariantA />
          </DCArtboard>
          <DCArtboard id="b" label="B · 药铺 Sidebar" width={1000} height={720} style={pad}>
            <VariantB />
          </DCArtboard>
          <DCArtboard id="c" label="C · 流水线 Stepper" width={1000} height={720} style={pad}>
            <VariantC />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
